<div class="public-container">
  <div class="public-content">

    <div class="error-code" *ngIf="showErrorCode; else iconOnly">
      <span class="digit">{{ errorCodeLeft || '4' }}</span>
      <span class="zero">
        <span class="material-icons icon">{{ icon }}</span>
      </span>
      <span class="digit">{{ errorCodeRight || '4' }}</span>
    </div>

    <ng-template #iconOnly>
      <div class="error-code single-icon">
        <span class="zero">
          <span class="material-icons icon">{{ icon }}</span>
        </span>
      </div>
    </ng-template>

    <h1 class="title">{{ title }}</h1>

    <p class="message">{{ message }}</p>

    <div class="actions">
      <app-button
        *ngIf="primaryButton"
        [variant]="primaryButton.variant || 'primary'"
        [size]="primaryButton.size || 'lg'"
        [iconLeft]="primaryButton.icon"
        (click)="handleAction(primaryButton, $event)"
        [loading]="primaryButton.loading || false"
        >
        {{ primaryButton.text }}
      </app-button>

      <app-button
        *ngIf="secondaryButton"
        [variant]="secondaryButton.variant || 'outline'"
        [size]="secondaryButton.size || 'lg'"
        [iconLeft]="secondaryButton.icon"
        (click)="handleAction(secondaryButton, $event)"
        [loading]="secondaryButton.loading || false"
        >
        {{ secondaryButton.text }}
      </app-button>
    </div>

    <div class="illustration" *ngIf="showIllustration" [class]="illustrationType">
      <ng-container [ngSwitch]="illustrationType">
        <svg *ngSwitchCase="'default'" width="120" height="120" viewBox="0 0 24 24" fill="none">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"
                fill="var(--color-primary)" opacity="0.2"/>
        </svg>

        <svg *ngSwitchCase="'unverified'" width="120" height="120" viewBox="0 0 24 24" fill="none">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"
                fill="var(--color-warning)" opacity="0.2"/>
        </svg>

        <svg *ngSwitchCase="'maintenance'" width="120" height="120" viewBox="0 0 24 24" fill="none">
          <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94 0 .31.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.57 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"
                fill="var(--color-primary)" opacity="0.2"/>
        </svg>
        <svg *ngSwitchCase="'unauthorized'" width="120" height="120" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" fill="var(--color-danger)" opacity="0.1"/>
          <path d="M12 2C9.24 2 7 4.24 7 7v3H6c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-8c0-1.1-.9-2-2-2h-1V7c0-2.76-2.24-5-5-5zm0 16c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3-9H9V7c0-1.66 1.34-3 3-3s3 1.34 3 3v3z"
                fill="var(--color-danger)" opacity="0.9"/>
          <line x1="4" y1="4" x2="20" y2="20"
                stroke="var(--color-danger)" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
        </svg>
      </ng-container>
    </div>

  </div>
</div>
<div class="theme-toggle">
  <app-theme-button></app-theme-button>
</div>
