<app-input
  [label]="label"
  [type]="showPassword ? 'text' : 'password'"
  [placeholder]="placeholder"
  [iconRight]="showPassword ? 'visibility_off' : 'visibility'"
  (iconRightClick)="togglePassword()"
  (valueChange)="handleValueChange($event)"
  [formControl]="control"
  (focusEvent)="handleFocus()"
  (blurEvent)="handleBlur()"
  [autocomplete]="autocomplete"
  [clearable]="true"
  [hint]="showHint ? hint : ''"

  >
</app-input>

<div class="password-info-container">
  <div *ngIf="showStrength && showInfo && currentValue" class="strength-container">
    <div class="strength-label">
      <span class="strength-text">Seguridad: {{ getStrengthText() }}</span>
      <span class="strength-percentage">{{ strength }}%</span>
    </div>
    <div class="strength-bar">
      <div
        class="strength-fill"
        [style.width.%]="strength"
        [ngClass]="getStrengthClass()">
      </div>
    </div>
  </div>

  <div *ngIf="showStrength && showInfo && currentValue" class="password-rules">
    <p [class.valid]="hasUppercase">✔ Una mayúscula</p>
    <p [class.valid]="hasLowercase">✔ Una minúscula</p>
    <p [class.valid]="hasNumber">✔ Un número</p>
    <p [class.valid]="hasSymbol">✔ Un símbolo</p>
    <p [class.valid]="hasMinLength">✔ Mínimo 8 caracteres</p>
  </div>
</div>
